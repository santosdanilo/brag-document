title: Frontend Engineer

introduction: |
  Frontend Software Engineer with over **7 years** of experience building scalable web applications with **Angular** and **TypeScript**.
  Led multiple **AngularJS → Angular** migrations in production environments, implemented complex state management with **NgRx** (feature stores, effects, actions), and established testing cultures using **Jest** and **Testing Library**.
  Strong engineering instincts around code clarity, long-term maintainability, and building frontend architectures that scale with the product — not against it.

experiences:
  - id: mytime
    roles:
      - id: mytime-frontend
        bullets:
          - Migrated a business-critical payment system from **AngularJS**/CoffeeScript to **Angular**/TypeScript, enabling continued product evolution without disrupting live operations.
          - Implemented **NgRx** state management with dedicated feature stores per POS module — coordinating multi-step checkout and payment flows through **effects and actions**, isolating state boundaries across modules and making async orchestration predictable and testable.
          - Rebuilt core POS modules to improve user experience and long-term maintainability, significantly reducing future change effort across the application.
          - Established automated test coverage with **Jest** and **Testing Library**, reducing regression risk on critical checkout and payment flows.
          - Implemented **W3C accessibility** standards across key user-facing screens, making the product fully operable for visually impaired users.

  - id: twenty20
    roles:
      - id: twenty20-frontend
        bullets:
          - Architected a browser-based desktop environment using **Angular/TypeScript**, applying **SOLID** principles and Clean Architecture to deliver a modular, maintainable codebase.
          - Introduced **Jest** for unit testing and **GitHub Actions** CI/CD pipelines, establishing automated quality gates from the project's start.
          - Configured linters and enforced code quality standards, ensuring consistency across a growing team.

  - id: greenAnt
    roles:
      - id: greenAnt-frontend
        bullets:
          - Developed reusable dashboard components for real-time energy analytics in **Angular**, using **RxJS** observable streams as a lightweight state layer — enabling live data updates and reactive component coordination without a dedicated state library.
          - Led a zero-downtime **AngularJS → Angular** migration using **Webpack** dual-environment bundling, keeping production stable throughout the transition.
          - Launched a mobile application with **Ionic** for invoice payment and data monitoring, reusing Angular component logic and adapting UX for mobile-first interactions.

  - id: gashub
    roles:
      - id: gashub-fullstack
        bullets:
          - Diagnosed and eliminated frontend rendering bottlenecks through three rounds of profiler analysis (flame graphs + fiber-level metrics) — reduced initial mount time from **59.1 ms → 1.8 ms (−97%)** and per-block commits from **13–31 ms → under 2 ms (−94%)**.
          - Reduced Products API latency from **3,010 ms → 132 ms (−95.7%)** via query parallelization, merged RLS transactions, and `EXPLAIN ANALYZE` profiling.
          - Built a data-intensive product browsing page with 5 independently-filtered blocks, infinite scroll, and **TanStack Virtual** row virtualization to handle large datasets without performance degradation.

skills:
  languages: TypeScript, JavaScript, English
  frontend: Angular, NgRx, Angular Material, TypeScript, RxJS, Ionic, CapacitorJS, Tailwind CSS, W3C Accessibility
  testing: Jest, Testing Library, Jasmine, Playwright
  backend: Node.js, NestJS, REST APIs, Supabase
  databases: PostgreSQL
  devops: GitHub Actions, GitLab CI, AWS Lambda, Docker
  architecture: Component-driven UI, state management, AngularJS → Angular migration, Clean Architecture, CI/CD
