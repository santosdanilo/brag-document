title: Senior Angular Fullstack Engineer

introduction: |
  Angular engineer with 7+ years who has spent much of that time working on systems that were too fragile to change — and making them reliable enough to ship from.
  Led two AngularJS → Angular migrations in live production environments without downtime, built test coverage from scratch across multiple teams, and tracked down production problems that crossed both the frontend and backend.
  Comfortable owning a problem end to end, whether it's a slow API, a broken UI, or a codebase that nobody wants to touch.

experiences:
  - id: mytime
    keySkills: Angular, NgRx, RxJS, TypeScript, AngularJS, Jest, Testing Library
    roles:
      - id: mytime-frontend
        bullets:
          - Took over a payment system written in **AngularJS** and CoffeeScript that the team was afraid to change — migrated it to **Angular**/TypeScript, rebuilt the core POS modules, and shipped a re-launch without disrupting live operations.
          - Brought structure to complex multi-step checkout flows using **NgRx** state management, making payment logic easier to reason about, debug, and test.
          - Built test coverage where there was almost none, using **Jest** and **Testing Library** — so the team could change payment logic without constantly worrying about breaking something.
          - Audited and improved accessibility across key screens so the product was usable for visually impaired customers.

  - id: twenty20
    keySkills: Angular, TypeScript, Jest, GitHub Actions, CI/CD
    roles:
      - id: twenty20-frontend
        bullets:
          - Designed a browser-based desktop environment in **Angular**/TypeScript from scratch, making architectural decisions early that kept the codebase straightforward to extend as the product grew.
          - Set up **Jest** tests and a **GitHub Actions** CI/CD pipeline from day one, giving the team a quality baseline they could rely on from the start.

  - id: greenAnt
    keySkills: Angular, AngularJS, RxJS, TypeScript, Webpack, AWS Lambda, GitLab CI
    roles:
      - id: greenAnt-frontend
        bullets:
          - Led the migration from **AngularJS** to **Angular** while keeping production running — used **Webpack** to run both versions side by side until the transition was complete.
          - Built a real-time energy analytics dashboard in **Angular** using **RxJS** to handle live data updates across components, keeping it responsive without introducing a state library.
          - Extracted PDF invoice generation into its own **Node.js** microservice on **AWS Lambda**, making it independently deployable and much easier to maintain.

  - id: gashub
    keySkills: React, TypeScript, Node.js, Deno, Drizzle ORM, PostgreSQL, Playwright, Testing Library, Zod
    roles:
      - id: gashub-fullstack
        bullets:
          - Tracked down an API slowdown that was making the platform feel broken — profiled the full stack, found sequential queries as the root cause, and cut response times by **95%** without changing how the feature worked.
          - Fixed a rendering issue that made the live trading view unusable when real data came in — worked through it systematically with the React profiler and got initial loads **97% faster**.
          - Cleaned up a backend that was tightly coupled to a single SDK — migrated to **Drizzle ORM** on **Node.js** and introduced a proper layered architecture with validation and clear separation between business logic and data access.
          - Built test coverage from zero using **Testing Library** and **Playwright**, so the team had a safety net before deploying changes.
          - Brought new engineers up to speed by documenting business rules, walking through the tricky parts of the codebase, and making sure knowledge wasn't stuck with one person.

skills:
  languages: TypeScript, JavaScript
  frontend: Angular, NgRx, RxJS, Angular Material, Ionic, CapacitorJS, Tailwind CSS, W3C Accessibility
  backend: Node.js, NestJS, Deno, Drizzle ORM, REST APIs, Zod
  testing: Jest, Testing Library, Playwright, Jasmine
  databases: PostgreSQL
  devops: GitHub Actions, GitLab CI, AWS Lambda, Docker
