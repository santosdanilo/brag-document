title: Senior Frontend Engineer

introduction: |
  Senior Frontend Engineer with 7+ years of experience building scalable, performant web applications using React, Next.js, and TypeScript.
  Delivered a real-time gas trading platform prototype in under 3 weeks, eliminated an API bottleneck cutting response times by 95%, and resolved a UX-breaking rendering issue achieving 97% faster loads — shipping an AI-driven operational platform in a fast-moving startup.
  Type-safe, architecture-minded engineer with hands-on experience in Drizzle ORM, Zod, TailwindCSS, and PostgreSQL-backed systems — comfortable owning features from database to UI.

