        bullets:
          - Architected a browser-based desktop environment from scratch — designed for modularity to keep the codebase maintainable as the product scaled.
          - Set up automated testing and a CI/CD pipeline from day one, giving the team a quality baseline to build on.

  - id: greenAnt
    keySkills: Angular, TypeScript, RxJS, AngularJS, Webpack, AWS Lambda, GitLab CI
    roles:
      - id: greenAnt-frontend
        bullets:
          - Built a real-time energy analytics dashboard with reusable components, making it straightforward to extend as the product evolved.
          - Migrated a production app from a legacy framework to a modern stack without any downtime — ran both versions in parallel during the transition to keep things stable.
          - Extracted PDF generation into a standalone service, decoupling it from the main app and making it independently deployable.

