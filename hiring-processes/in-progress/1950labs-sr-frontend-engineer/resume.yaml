    keySkills: React, TypeScript, TailwindCSS, Drizzle ORM, Zod, PostgreSQL, TanStack Virtual, Playwright, Testing Library, Deno
    roles:
      - id: gashub-fullstack
        bullets:
          - Brought a real-time gas trading platform to market in under **3 weeks**, giving the team a working product to test assumptions with real users before committing to full-scale development.
          - Improved rendering performance on the live trading interface, reducing load times by **97%** through systematic profiling and targeted optimizations.
          - Resolved an API performance issue on the core product listings, cutting response times by **95%** through query and architecture improvements.
          - Built the core product browsing experience to stay fast as data volumes grew — designed for scale from the start to support future growth without a costly rebuild.
          - Refactored the backend to support complex multi-step operations reliably — introduced proper transaction handling, input validation, and a clean structure that made the codebase easier to extend.
          - Set up automated tests across the application so the team could confidently ship new features without causing regressions.

  - id: mytime
    keySkills: Angular, TypeScript, NgRx, Jest, Testing Library, AngularJS
    roles:
      - id: mytime-frontend
        bullets:
          - Modernized the payment platform to **TypeScript**, enabling a successful re-launch and giving the team a stable foundation to keep evolving the product.
          - Rebuilt the state management for complex checkout and payment flows, making them more predictable and easier to maintain as the product grew.
          - Built a test suite covering the most critical checkout flows, giving the team confidence to make changes without causing regressions.
          - Made the product fully usable for people with visual impairments by implementing accessibility standards across key screens.

  - id: twenty20
    roles:
