title: Senior Frontend Engineer

introduction: |
  Senior Frontend Engineer with 7+ years of experience building web products that scale — from payment platforms to real-time trading tools.
  Most recently shipped a gas trading platform prototype in under 3 weeks, then improved it: API response times down 95%, page load times down 97%, and a codebase the team could confidently build on.
  I care about writing frontend that holds up as products grow — working closely with product and design, owning features end-to-end, and solving real problems instead of just shipping code.

experiences:
