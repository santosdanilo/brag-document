title: Sr. Frontend Developer

introduction: |
  Senior Frontend Software Engineer with over **7 years** of experience building scalable web and mobile products with **React**, **Next.js**, **Angular**, and **TypeScript**.
  Delivered a real-time trading platform prototype in under **3 weeks**, improved frontend load performance by **97%** through profiling-led optimisation, and modernised legacy applications through zero-downtime migrations.
  Strong fit for remote product teams that value accessibility, responsive UX, clean architecture, automated testing, and autonomous ownership.

experiences:
