        bullets:
          - Migrated a business-critical payment flow from **AngularJS/CoffeeScript** to **Angular/TypeScript**, helping the company relaunch the platform without interrupting day-to-day operations.
          - Reworked core POS flows to make them easier to use and easier for the team to maintain over time.
          - Added support for **W3C accessibility** standards across key screens so visually impaired users could use the product more reliably.
          - Increased confidence in checkout changes by adding automated tests with **Jest** and **Testing Library**.

  - id: twenty20
    roles:
      - id: twenty20-frontend
        bullets:
          - Designed a modular browser-based desktop environment in **Angular/TypeScript**, giving the project a frontend foundation that could scale as new features were added.
          - Set up **Jest** and **GitHub Actions** CI/CD to give the team its first automated quality checks.

  - id: greenAnt
    roles:
      - id: greenAnt-frontend
        bullets:
          - Led an **AngularJS → Angular** migration with no downtime by running both environments side by side with **Webpack** during the transition.
          - Built reusable dashboard components for real-time energy analytics, giving enterprise clients clearer visibility into their data.
          - Released a mobile app with **Ionic** so customers could pay invoices and monitor energy usage from their phones.

