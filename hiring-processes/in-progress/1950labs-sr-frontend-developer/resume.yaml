        bullets:
          - Delivered a real-time trading platform prototype in under **3 weeks** using **React**, enabling rapid product validation in a fast-moving startup environment.
          - Fixed a UX-breaking rendering bottleneck on the core trading interface, achieving **97% faster** initial loads through **React 18 Profiler**-driven optimisation.
          - Architected a high-volume product discovery experience with virtualized lists, infinite scroll, and independent filtering, keeping the UI responsive as data volume grew.
          - Enabled confident releases by establishing **Testing Library** unit coverage and **Playwright** end-to-end tests across critical user flows.

  - id: mytime
    roles:
