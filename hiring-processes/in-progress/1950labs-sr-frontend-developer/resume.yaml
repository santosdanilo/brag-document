        bullets:
          - Modernized a business-critical payment experience by migrating **AngularJS/CoffeeScript** to **Angular/TypeScript**, supporting a successful platform re-launch without disrupting operations.
          - Rebuilt core POS flows to improve usability and long-term maintainability in a global scheduling and payments platform.
          - Implemented **W3C accessibility** standards across key screens, expanding usability for visually impaired users.
          - Reduced regression risk on checkout flows by adding high-coverage automated tests with **Jest** and **Testing Library**.

  - id: twenty20
    roles:
      - id: twenty20-frontend
        bullets:
          - Architected a modular browser-based desktop environment in **Angular/TypeScript**, translating complex product requirements into a scalable frontend foundation.
          - Introduced **Jest** testing and **GitHub Actions** CI/CD, establishing the first automated quality gates for the project.

  - id: greenAnt
    roles:
      - id: greenAnt-frontend
        bullets:
          - Led a zero-downtime **AngularJS → Angular** migration using dual-environment **Webpack** bundling, keeping production stable throughout the transition.
          - Built reusable dashboard components for real-time energy analytics, improving data visibility for enterprise clients.
          - Launched a mobile app with **Ionic**, expanding access to invoice payment and energy monitoring on the go.

