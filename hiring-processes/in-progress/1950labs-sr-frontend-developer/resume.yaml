title: Sr. Frontend Developer

introduction: |
  Senior Frontend Software Engineer with over **7 years** of experience building products with **React**, **Next.js**, **Angular**, and **TypeScript**.
  Most of my recent work has focused on shipping complex frontend features quickly, improving performance, and making legacy systems easier to maintain.
  I work best in product teams that care about accessibility, responsive UX, clean code, and engineers who can own problems end to end.

experiences:
