          - Improved the performance of the main trading screen after profiling render bottlenecks, cutting initial load time by **97%**.
          - Designed a product browsing experience with virtualized lists, infinite scroll, and independent filters so the UI stayed responsive as the dataset grew.
          - Added **Testing Library** unit tests and **Playwright** end-to-end coverage for key user flows, making releases safer.

  - id: mytime
    roles:
